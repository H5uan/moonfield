[workspace]
members = ["crates/*", "examples/triangle", "examples/asset_example"]
resolver = "3"

[workspace.package]
edition = "2024"

[workspace.dependencies]
moonfield-core = { path = "./crates/moonfield-core" }
moonfield-rhi = { path = "./crates/moonfield-rhi" }
moonfield-transform = { path = "./crates/moonfield-transform" }
moonfield-math = { path = "./crates/moonfield-math" }

winit = "0.30.12"
raw-window-handle = "0.6.2"
anyhow = "1.0.102"

ash = "0.38.0"
ash-window = "0.13.0"
gltf = "1.4.1"
moonfield-shader = { path = "./crates/moonfield-shader" }
gpu-allocator = "0.28.0"

# macOS/iOS specific dependencies - only available on Apple platforms
objc2 = "0.6.1"
objc2-app-kit = "0.3.1"
objc2-core-foundation = "0.3.1"
objc2-foundation = "0.3.1"
objc2-metal = "0.3.1"
objc2-quartz-core = "0.3.1"

rand = "0.10.0"
bytemuck = { version = "1.25.0", features = ["derive"] }
tokio = "1.50.0"
thiserror = "2.0.18"
bitflags = "2.11.0"
serde = "1.0.228"
strum = "0.28.0"
strum_macros = "0.28.0"

nalgebra = "0.34.1"

# Tracing dependencies
tracing = "0.1.44"
tracing-subscriber = "0.3.19"
tracing-appender = "0.2.3"
tracing-log = "0.2.0"

[profile.dev]
opt-level = 1

[profile.release]
opt-level = 3
debug = true